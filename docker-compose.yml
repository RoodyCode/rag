services:
  pgvector:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: chat-app
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chat_app
    ports:
      - "5432:5432"

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      - redis

  mcp:
    build: .
    command: uv run python mcp_server.py
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_URL: postgresql://chat-app:admin@pgvector:5432/chat_app
    depends_on:
      - pgvector
      - redis

  worker:
    build: .
    command: uv run python worker.py
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_URL: postgresql://chat-app:admin@pgvector:5432/chat_app
    depends_on:
      - pgvector
      - redis
    mem_limit: 2g

volumes:
  redis_insight_data:
